<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Note Making App</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>  
<link href="style.css" rel="stylesheet">
</head>
<body class="bg-dark">
    <div class="container">
        <div class="mt-4 border border-secondary bg-light round">
            <h1 class="display-1  p-4 fw-bold text-center text-primary">Note Making App</h1>
            <p class="text-center fs-5 text-muted">This app will let you add note and delete them.</p>
            <div class="m-4 ">
                <textarea id="input_notes" class="text-muted form-control mb-3" placeholder="Enter your notes..."></textarea>
                <button onclick="save()" class="btn btn-danger w-100">Save Note</button>
            </div>
        </div>

        <div class="mt-4" id="div_id">
            <ul id="ul_id">
                <li class="text-light fs- text-center p-4 fw-bold" >No Saved Notes yet ...</li>
            </ul>
        </div>

    </div>
    

    <script src="script.js"></script>
</body>
</html>
