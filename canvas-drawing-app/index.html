<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canvas Drawing App</title>
       <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>

</head>
<body class="bg-dark m-4">
    <div class="container-fluid text-center bg-warning rounded-3 p-4">
        <h1 class="text-primary display-3 fw-bold">CAnvas Drawing App</h1>
        <p class="text-muted fs-5">“A simple canvas drawing app with custom brushes, clear option, and PNG export.</p>

    </div>
    <div class=" text-center mt-4">
        <canvas id="canva" class="w-100 border bg-white rounded-3" style="max-width: 100%; height: auto;"></canvas>

    </div>
    <div class="text-center ">
        <div>
        <label class="text-light mt-4" for="color">Choose Color: </label>
        <input type="color" id="color" value="red">
</div>
<div>
        <label class="text-light mt-4" for="size">Choose Brush Size: </label>
        <input type="range" id="size" min="1" max="20" value="2">

     
        </div>
        <div class="mt-4">
        <button id="clear" class="btn btn-info text-light">Clear Screen</button></div>
        <div><button id="save" class="btn btn-primary mt-4 ">Save as PNG</button></div>
    </div>
    
    <script src="script.js"></script>
    
</body>
</html>
