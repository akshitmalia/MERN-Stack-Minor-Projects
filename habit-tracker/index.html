<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habit Tracker</title>
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
<style>
    .listType{
        list-style-type: none;
    }
    .completed{
        text-decoration: line-through;
        opacity: 0.3;
    }
</style>
</head>
<body >
    <div class="container text-center">
        <div>
            <h1 class="mt-4 text-primary">Habit Tracker App</h1>
            <p class="text-muted mt-4">This app will let you track your habits.</p>
        </div>
    </div>
    <div class="container">
        <form id="formId" class="border border-primary p-4 m-4 rounded-3 form-group">
            <label for="habit">Habits:</label>
            <input id="habit" type="text" placeholder="Enter your habits" class="form-control mt-4 col-md-4">

            <div class="d-grid gap-2">
  <button onclick="add()" class="btn btn-primary mt-4" type="button">Add</button>
  <button onclick="reset()" class="btn btn-danger" type="button">Reset</button>
</div>
        </form>
        <div class="container text-center mt-4">
            <h3 class="text-primary fw-normal  border-primary border-bottom border-3">Saved Habits</h3>
        </div>
    </div>
    <div class="progress m-4" role="progressbar" aria-label="Example with label" aria-valuenow="25" aria-valuemin="0" aria-valuemax="100">
  <div class="progress-bar" style="width: 0%">0%</div>
</div>
    <div class="container">
        <ul id="habitList" class="text-danger mt-4">
            <li class="listType">Habits will be saved here !!!</li></ul>
    </div>

    <script src="script.js"></script>
    
</body>
</html>
